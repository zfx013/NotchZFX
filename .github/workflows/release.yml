name: Build & Release

# Se déclenche quand on pousse un tag "vX.Y.Z" (ou manuellement).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------- macOS
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm install
      - name: Package .app (script maison : helpers Swift + signature ad-hoc)
        run: bash scripts/package-mac.sh
      - name: Create DMG + zip
        run: |
          VER=${GITHUB_REF_NAME#v}
          hdiutil create -volname "NotchZFX" -srcfolder "dist/NotchZFX.app" -ov -format UDZO "dist/NotchZFX-${VER}-mac-arm64.dmg"
          ditto -c -k --keepParent "dist/NotchZFX.app" "dist/NotchZFX-${VER}-mac-arm64.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: mac
          path: |
            dist/*.dmg
            dist/*-mac-*.zip

  # ---------------------------------------------------------------- Windows
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm install
      - name: Build installer (electron-builder)
        run: npx electron-builder --win --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: win
          path: |
            dist/*.exe
            dist/*-win-*.zip

  # ---------------------------------------------------------------- Linux
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm install
      - name: Build packages (electron-builder)
        run: npx electron-builder --linux --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            dist/*.AppImage
            dist/*.deb

  # ---------------------------------------------------------------- Release
  release:
    needs: [build-mac, build-win, build-linux]
    runs-on: ubuntu-latest
    # Publie meme si une plateforme echoue (on attache ce qui a reussi).
    if: ${{ always() && startsWith(github.ref, 'refs/tags/') }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: false
